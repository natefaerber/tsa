version: 2

project_name: tsa

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: .
    binary: tsa
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/natefaerber/tsa/cmd.Version={{.Version}}
      - -X github.com/natefaerber/tsa/cmd.Commit={{.ShortCommit}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
